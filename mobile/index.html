<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenDraw Controller</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #38bdf8;
            --ui-bg: rgba(30, 41, 59, 0.8);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none;
        }
        #canvas {
            display: block;
            touch-action: none;
            position: absolute;
            z-index: 2;
            background: transparent;
        }
        #screen-stream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            background: #000;
            pointer-events: none;
            will-change: transform;
            /* Compensate for limited YUV color range in WebRTC — restores vivid colors */
            filter: contrast(1.08) saturate(1.15) brightness(1.03);
        }
        .controls-wrapper {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--ui-bg);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }
        .controls-wrapper.dragging {
            transition: none;
            opacity: 0.9;
        }
        .controls-wrapper.collapsed .controls-content {
            display: none;
        }
        .controls-wrapper.collapsed .drag-handle {
            display: none;
        }
        .controls-content {
            display: flex;
            gap: 12px;
            padding: 5px 20px 10px 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 350px;
        }
        .collapsed-tools {
            display: none;
            padding: 10px 20px;
            width: 100%;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .controls-wrapper.collapsed .collapsed-tools {
            display: flex;
        }
        .drag-handle {
            width: 100%;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            color: rgba(255,255,255,0.4);
            font-size: 20px;
            line-height: 1;
            touch-action: none;
        }
        .drag-handle:active {
            cursor: grabbing;
            color: rgba(255,255,255,0.8);
        }
        .toggle-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            padding: 4px 20px 6px 20px;
            cursor: pointer;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .controls-wrapper.collapsed {
            border-radius: 25px;
        }
        .controls-wrapper.collapsed .toggle-btn {
            border-top: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 101;
            background: rgba(255,255,255,0.05);
        }
        .btn-clear { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .btn-clear:active { background: rgba(239, 68, 68, 0.4); }
        .btn.active { 
            background: var(--accent); 
            color: var(--bg);
            box-shadow: 0 0 15px var(--accent);
        }
        
        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: scale 0.2s;
            position: relative;
            z-index: 101;
        }
        .color-dot.active { border-color: white; scale: 1.2; }
        
        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        /* Monitor Selector */
        #monitor-list {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--ui-bg);
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 200px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
        }
        #monitor-list.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .monitor-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .monitor-item:active { background: rgba(255,255,255,0.1); }
        .monitor-item.active { background: var(--accent); color: var(--bg); font-weight: 600; }
        .monitor-item .res { font-size: 10px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="status">Live Session Active</div>
    <video id="screen-stream" autoplay playsinline muted disablePictureInPicture></video>
    <canvas id="canvas"></canvas>

    <div id="monitor-list">
        <!-- populated dynamically -->
    </div>

    <div class="controls-wrapper" id="controlsWrapper">
        <div class="drag-handle" id="dragHandle">≡</div>
        <div class="controls-content" id="controlsContent">
            <button class="btn" id="monitorBtn" title="Select Monitor">🖥️</button>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
            <div class="color-dot active" style="background: #ef4444;" data-color="#ef4444"></div>
            <div class="color-dot" style="background: #10b981;" data-color="#10b981"></div>
            <div class="color-dot" style="background: #3b82f6;" data-color="#3b82f6"></div>
            <div class="color-dot" style="background: #f59e0b;" data-color="#f59e0b"></div>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
            <button class="btn" id="stylusBtn" title="Stylus Mode">✏️</button>
            <button class="btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
            <button class="btn btn-clear" id="clearBtn">Clear</button>
        </div>
        <div class="collapsed-tools" id="collapsedTools">
            <button class="btn btn-clear" id="quickClearBtn">🗑️ Quick Clear</button>
        </div>
        <button class="toggle-btn" id="toggleBtn">▼ Hide Tools</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
