<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenDraw Controller</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #38bdf8;
            --ui-bg: rgba(30, 41, 59, 0.8);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none;
        }
        #canvas {
            display: block;
            touch-action: none;
            position: absolute;
            z-index: 2;
            background: transparent;
        }
        #screen-stream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            opacity: 0.8;
            background: #000;
            pointer-events: none;
        }
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: var(--ui-bg);
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            align-items: center;
            z-index: 100;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 101;
        }
        .btn-clear { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .btn-clear:active { background: rgba(239, 68, 68, 0.4); }
        .btn.active { 
            background: var(--accent); 
            color: var(--bg);
            box-shadow: 0 0 15px var(--accent);
        }
        
        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: scale 0.2s;
            position: relative;
            z-index: 101;
        }
        .color-dot.active { border-color: white; scale: 1.2; }
        
        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="status">Live Session Active</div>
    <img id="screen-stream" src="" alt="" draggable="false">
    <canvas id="canvas"></canvas>

    <div class="controls">
        <div class="color-dot active" style="background: #ef4444;" data-color="#ef4444"></div>
        <div class="color-dot" style="background: #10b981;" data-color="#10b981"></div>
        <div class="color-dot" style="background: #3b82f6;" data-color="#3b82f6"></div>
        <div class="color-dot" style="background: #f59e0b;" data-color="#f59e0b"></div>
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
        <button class="btn" id="stylusBtn" title="Stylus Mode">✏️</button>
        <button class="btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
        <button class="btn btn-clear" id="clearBtn">Clear All</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
