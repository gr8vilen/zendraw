<!DOCTYPE html>
<html>
<head>
    <title>ZenDraw Desktop</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 100;
            transition: opacity 0.5s ease;
            pointer-events: auto; /* Allow UI interaction */
        }
        #ui-layer.hidden {
            opacity: 0;
            pointer-events: none;
        }
        h2 { margin: 0 0 10px 0; font-size: 14px; color: #333; }
        #qr-code { width: 120px; height: 120px; margin-bottom: 5px; }
        #url-text { font-size: 10px; color: #666; word-break: break-all; }
        .hint { font-size: 9px; margin-top: 5px; color: #888; }
        .window-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }
        .window-controls button {
            background: #f0f0f0;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: #555;
        }
        .window-controls button:hover {
            background: #e0e0e0;
        }
        #close-btn:hover {
            background: #ff4d4d;
            color: white;
        }
        #connection-info.hidden {
            display: none;
        }
        #status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 10px;
            background: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 5px;
        }
        #status-badge.hidden {
            display: none;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            box-shadow: 0 0 5px #4caf50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }
        #cursor-dot {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui-layer">
        <div class="window-controls">
            <button id="min-btn" title="Minimize">─</button>
            <button id="close-btn" title="Quit">×</button>
        </div>
        
        <div id="connection-info">
            <h2>Connect Phone</h2>
            <img id="qr-code" src="" alt="QR Code">
            <div id="url-text"></div>
            <div class="hint">Draw on phone to sketch on screen</div>
        </div>

        <div id="status-badge" class="hidden">
            <div class="status-dot"></div>
            <span>Connected</span>
        </div>
    </div>

    <div id="cursor-dot"></div>

    <script src="renderer.js"></script>
</body>
</html>
